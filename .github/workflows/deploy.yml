name: Deploy to AWS

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  PROJECT_NAME: flatmate-finance
  ECR_REPOSITORY: flatmate-finance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Gate: job-level `if` cannot use secrets or env — use a step instead.
      - name: Check deploy is configured
        id: deploy-ready
        run: |
          if [ -n "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "AWS_ROLE_ARN is set — continuing deploy."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy — add GitHub secret AWS_ROLE_ARN after IAM stack."
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.deploy-ready.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.deploy-ready.outputs.ready == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        if: steps.deploy-ready.outputs.ready == 'true'
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.ecr-login.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        if: steps.deploy-ready.outputs.ready == 'true'
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${{ steps.meta.outputs.sha_tag }}"
          BUILD_APP_URL="${APP_URL:-https://placeholder.example}"
          docker build \
            -f Dockerfile \
            --build-arg NEXT_PUBLIC_APP_URL="${BUILD_APP_URL}" \
            -t "${IMAGE}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${IMAGE}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Force new ECS deployment
        if: steps.deploy-ready.outputs.ready == 'true'
        continue-on-error: true
        run: |
          aws ecs update-service \
            --cluster "${PROJECT_NAME}-cluster" \
            --service "${PROJECT_NAME}-app" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      # Step-level `if` may use secrets (job-level `if` may not).
      - name: Invalidate CloudFront cache
        if: ${{ steps.deploy-ready.outputs.ready == 'true' && secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
