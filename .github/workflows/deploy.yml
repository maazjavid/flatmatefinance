# Deploy to AWS on push to dev.
#
# GitHub Actions rules (not related to VPC/RDS being incomplete):
# - Do NOT use `secrets.*` or job-level `env` inside `if:` — use step outputs instead.
# - Secrets are OK inside `run:` scripts and `env:` / `with:` blocks.
#
# Until AWS_ROLE_ARN is set (after IAM stack), deploy steps are skipped (workflow still succeeds).

name: Deploy to AWS

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  PROJECT_NAME: flatmate-finance
  ECR_REPOSITORY: flatmate-finance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect which secrets are configured
        id: gates
        run: |
          if [ -n "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "AWS_ROLE_ARN is set."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped — add GitHub Actions secret AWS_ROLE_ARN after IAM stack."
          fi
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "cf=true" >> "$GITHUB_OUTPUT"
          else
            echo "cf=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.gates.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.gates.outputs.deploy == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        if: steps.gates.outputs.deploy == 'true'
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.ecr-login.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        if: steps.gates.outputs.deploy == 'true'
        env:
          REGISTRY: ${{ steps.meta.outputs.registry }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${{ steps.meta.outputs.sha_tag }}"
          BUILD_APP_URL="${APP_URL:-https://placeholder.example}"
          docker build \
            -f Dockerfile \
            --build-arg NEXT_PUBLIC_APP_URL="${BUILD_APP_URL}" \
            -t "${IMAGE}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:latest" \
            .
          docker push "${IMAGE}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Force new ECS deployment
        if: steps.gates.outputs.deploy == 'true'
        continue-on-error: true
        run: |
          aws ecs update-service \
            --cluster "${PROJECT_NAME}-cluster" \
            --service "${PROJECT_NAME}-app" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      - name: Invalidate CloudFront cache
        if: steps.gates.outputs.deploy == 'true' && steps.gates.outputs.cf == 'true'
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
