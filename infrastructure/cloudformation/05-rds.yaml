AWSTemplateFormatVersion: "2010-09-09"
Description: RDS PostgreSQL in private subnets.

Parameters:
  ProjectName:
    Type: String
    Default: flatmate-finance
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: Use db.t3.micro on AWS Free Tier; use db.t3.small+ after upgrading
  EngineVersion:
    Type: String
    Default: "16.9"
    Description: PostgreSQL minor version available in your region (see RDS describe-db-engine-versions)
  DbName:
    Type: String
    Default: flatmate
  DbUsername:
    Type: String
    Default: flatmate_admin
  DbPasswordSecretArn:
    Type: String
    Description: Secrets Manager ARN for flatmate-finance/db-password
  BackupRetentionPeriod:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 35
    Description: Days of automated backups (use 1 on AWS Free Tier; increase after upgrading account)

Resources:
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS
      SubnetIds:
        - Fn::ImportValue: !Sub "${ProjectName}-PrivateSubnet1Id"
        - Fn::ImportValue: !Sub "${ProjectName}-PrivateSubnet2Id"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-db-subnets"

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-postgres"
      Engine: postgres
      EngineVersion: !Ref EngineVersion
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      DBName: !Ref DbName
      MasterUsername: !Ref DbUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DbPasswordSecretArn}:SecretString}}"
      VPCSecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-RdsSecurityGroupId"
      DBSubnetGroupName: !Ref DbSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      DeletionProtection: true
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-postgres"

Outputs:
  DbEndpoint:
    Value: !GetAtt Database.Endpoint.Address
    Export:
      Name: !Sub "${ProjectName}-DbEndpoint"
  DbPort:
    Value: !GetAtt Database.Endpoint.Port
    Export:
      Name: !Sub "${ProjectName}-DbPort"
  DbName:
    Value: !Ref DbName
    Export:
      Name: !Sub "${ProjectName}-DbName"
  DbUsername:
    Value: !Ref DbUsername
    Export:
      Name: !Sub "${ProjectName}-DbUsername"
