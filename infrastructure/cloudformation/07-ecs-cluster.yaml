AWSTemplateFormatVersion: "2010-09-09"
Description: ECS Fargate cluster and CloudWatch log group for the Next.js app.

Parameters:
  ProjectName:
    Type: String
    Default: flatmate-finance

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}/app"
      RetentionInDays: 30

Outputs:
  ClusterName:
    Value: !Ref Cluster
    Export:
      Name: !Sub "${ProjectName}-ClusterName"
  AppLogGroupName:
    Value: !Ref AppLogGroup
    Export:
      Name: !Sub "${ProjectName}-AppLogGroupName"
